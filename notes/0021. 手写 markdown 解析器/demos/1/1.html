<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Markdown 解析结果</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 4px; overflow-x: auto; }
    code { background: #f5f5f5; padding: 2px 4px; border-radius: 3px; }
    pre code { background: none; padding: 0; }
    blockquote { border-left: 4px solid #ddd; margin: 0; padding-left: 16px; color: #666; }
    img { max-width: 100%; }
    hr { border: none; border-top: 1px solid #ddd; }
  </style>
</head>
<body>
<h1>极简 Markdown 解析器</h1>
<p>这是一个 <strong>极简</strong> 的解析器，支持 <em>常见</em> 语法。</p>
<h2>功能列表</h2>
<ul>
<li>标题（# 到 ######）</li>
<li>粗体 <strong>bold</strong> 和斜体 <em>italic</em></li>
<li><a href="https://example.com">链接</a></li>
<li>图片：</li>
</ul>
<p><img src="https://cdn.jsdelivr.net/gh/Tdahuyou/imgs@main/assets/footprints.png" alt="TNotes logo" /></p>
<ul>
<li><code>行内代码</code></li>
<li>列表（有序和无序）</li>
<ul>
<li>1</li>
<ul>
<li>1.1</li>
</ul>
<li>2</li>
<ul>
<li>2.1</li>
<ul>
<li>2.1.1</li>
</ul>
</ul>
</ul>
<li>引用块</li>
</ul>
<blockquote>这是引用块</blockquote>
<ul>
<li>分割线</li>
</ul>
<hr />
<ol>
<li>有序列表第一项</li>
<li>第二项，包含 <strong>加粗</strong> 文字</li>
</ol>
<hr />
<p>代码示例：<code>console.log("Hello")</code></p>
<pre><code>代码块</code></pre>
<p>最后是一个普通段落，包含行内元素。</p>
</body>
</html>
